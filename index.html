<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧪 魔法药剂排序 - 儿童闯关</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav-bar">
  <div class="title">
    <span class="mascot">🧙‍♂️</span>
    <span>魔法药剂学院</span>
  </div>
  <div class="stats">
    <span class="stat-item" id="total-stars">⭐ 0</span>
    <span class="stat-item" id="best-level">🏆 1</span>
  </div>
</div>

<div class="main-container">
  <div class="level-header">
    <div class="level-badge" id="level-badge">第 1 关</div>
    <div class="level-meta">
      <div class="meta-item">
        <span class="meta-value" id="move-count">0</span>
        <span class="meta-label">步数</span>
      </div>
      <div class="meta-item">
        <span class="meta-value" id="best-move">-</span>
        <span class="meta-label">最佳</span>
      </div>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>

  <div class="bottle-area" id="bottle-area"></div>

  <div class="action-bar">
    <button class="btn btn-ghost btn-sm" onclick="doHint()">💡 提示</button>
    <button class="btn btn-ghost btn-sm" onclick="doUndo()">↩ 撤回</button>
    <button class="btn btn-warn btn-sm" onclick="doReset()">🔄 重玩</button>
    <button class="btn btn-ghost btn-sm" onclick="showLevelPicker()">📋 选关</button>
  </div>
</div>

<div class="overlay" id="win-overlay">
  <div class="dialog">
    <div id="mascot-reaction" style="font-size:52px;margin-bottom:6px">🎉</div>
    <h3 id="win-title">太棒啦！</h3>
    <div class="subtitle" id="win-sub"></div>
    <div class="star-row" id="win-stars"></div>
    <button class="btn btn-success" style="width:100%;margin-bottom:8px;justify-content:center" onclick="closeWin();goNextLevel()">下一关 ➡️</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="closeWin();doReset()">再玩一次</button>
  </div>
</div>

<div class="overlay" id="picker-overlay">
  <div class="dialog">
    <h3>📚 药剂图鉴</h3>
    <div class="subtitle">选择要挑战的关卡吧！</div>
    <div class="level-grid" id="level-grid"></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:14px;justify-content:center" onclick="closePicker()">关闭</button>
  </div>
</div>

<div class="overlay show" id="load-overlay">
  <div class="dialog">
    <div style="font-size:48px;margin-bottom:10px">🧪</div>
    <h3>正在调配魔法药剂...</h3>
    <div class="subtitle" id="load-msg">正在获取最新关卡数据</div>
    <div class="loading-spinner" style="margin:0 auto"></div>
  </div>
</div>

<div class="sparkle-container" id="sparkle-container"></div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="storage.js"></script>
<script src="effects.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
